# .github/workflows/hyperexecute.yml
name: HyperExecute – Playwright 102

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  hyperexecute:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Download HyperExecute CLI
      - name: Download HyperExecute CLI
        run: |
          curl -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      # 3. Trigger tests on HyperExecute
      #    Secrets are stored in GitHub → Settings → Secrets → Actions
      - name: Run tests on HyperExecute
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          ./hyperexecute \
            --user $LT_USERNAME \
            --key $LT_ACCESS_KEY \
            --config hyperexecute.yaml
