version: 0.1
runson: win10
parallelism: 2
concurrency: 2

env:
  APP_ENV: staging
  LT_USERNAME: ${{ .secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ .secrets.LT_ACCESS_KEY }}

secrets:
  - LT_USERNAME
  - LT_ACCESS_KEY

cacheKey: "{{ checksum \"package.json\" }}"
cacheDirectories:
  - node_modules
  - "%APPDATA%\\Microsoft\\Windows\\PowerShell\\PSReadLine"

pre:
  - npm install
  - npx playwright install chromium
  - npx playwright install-deps chromium

testSuites:
  - npx playwright test --reporter=list,html

post:
  - echo "All test reports collected."

uploadArtefacts:
  - name: PlaywrightHTMLReport
    path:
      - playwright-report/
  - name: ScreenshotsAndVideos
    path:
      - test-results/

jobLabel:
  - playwright-102
  - assignment